<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fulate Playground</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/material-symbols@0.27.0/outlined.css" />
    <script>document.fonts.ready.then(() => document.getElementById("app")?.dispatchEvent(new Event("fontsready")));</script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; height: 100vh; background: #f5f5f5; }
      #sidebar { width: 220px; background: #1e1e2e; color: #cdd6f4; padding: 16px 0; overflow-y: auto; flex-shrink: 0; }
      #sidebar h2 { font-size: 16px; padding: 0 16px 12px; color: #89b4fa; border-bottom: 1px solid #313244; margin-bottom: 8px; }
      #sidebar .group-title { font-size: 11px; text-transform: uppercase; color: #6c7086; padding: 12px 16px 4px; letter-spacing: 1px; }
      #sidebar a { display: block; padding: 8px 16px; color: #cdd6f4; text-decoration: none; font-size: 14px; transition: background 0.15s; }
      #sidebar a:hover { background: #313244; }
      #sidebar a.active { background: #45475a; color: #89b4fa; }
      #main { flex: 1; display: flex; flex-direction: column; }
      #toolbar { height: 40px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; padding: 0 16px; font-size: 14px; color: #333; }
      #toolbar .title { font-weight: 600; }
      #canvas-container { flex: 1; position: relative; }
      #fps { position: absolute; top: 8px; right: 8px; padding: 4px 10px; background: rgba(0,0,0,0.7); color: #0f0; font-family: monospace; font-size: 13px; z-index: 9999; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="sidebar"></div>
    <div id="main">
      <div id="toolbar">
        <span class="title" id="demo-title"></span>
      </div>
      <div id="canvas-container">
        <div id="app" style="width: 100%; height: 100%;"></div>
        <div id="fps"></div>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
